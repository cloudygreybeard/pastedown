name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version information
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_DATE=$(date -u +"%Y-%m-%d")

          mkdir -p Sources/Pastedown
          cat > Sources/Pastedown/Version.swift << EOF
          struct Version {
              static let version = "$VERSION"
              static let buildDate = "$BUILD_DATE"
          }
          EOF

      - name: Build universal binary
        run: |
          swift build -c release --triple arm64-apple-macos
          cp .build/release/pastedown ./pastedown-arm64

          swift build -c release --triple x86_64-apple-macos
          cp .build/release/pastedown ./pastedown-x86_64

          lipo -create -output ./pastedown ./pastedown-arm64 ./pastedown-x86_64
          chmod +x ./pastedown
          file ./pastedown

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./pastedown
          name: pastedown ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: pastedown
      binary-name: pastedown
      formula-class: Pastedown
      formula-desc: "macOS Pasteboard to Markdown"
      artifact-style: binary
      private: false
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
